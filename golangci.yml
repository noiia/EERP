run:
  timeout: 5m
linters:
  enable:
    - govet
    - staticcheck
    - gofmt
    - goimports
    - errcheck
    - gocyclo
    - depguard
issues:
  exclude-use-default: false
  max-same-issues: 5
linters-settings:
  gocyclo:
    min-complexity: 10
  depguard:
    list-type: blacklist
    packages:
      - "fmt"
      - "log"